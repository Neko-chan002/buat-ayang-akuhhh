<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeri Kenangan Spesial</title>
  <script src="music.js"></script>
  
  <!-- Memuat Tailwind CSS untuk styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Memuat Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Konfigurasi Kurva Animasi Estetik (Smooth ease-out) */
    :root {
      --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Animasi Dasar */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }

    /* Teks Pembuka */
    .animate-title {
      opacity: 0;
      animation: fadeUp 1.5s var(--ease-spring) forwards;
    }
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.3s; }

    /* Class untuk Scroll Reveal via JS */
    .reveal-item {
      opacity: 0;
      transform: translateY(50px);
      transition: all 1.2s var(--ease-spring);
    }
    .reveal-item.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Animasi Spotlight di belakang gambar */
    .spotlight-anim {
      animation: pulseGlow 4s ease-in-out infinite;
    }

    /* Transisi Modal & Plakat */
    #lightbox-modal {
      transition: opacity 0.5s ease-out, backdrop-filter 0.5s ease;
    }
    #lightbox-modal.show {
      opacity: 1;
      pointer-events: auto;
    }
    
    #lightbox-content {
      transition: transform 0.6s var(--ease-spring), opacity 0.6s ease-out;
      transform: scale(0.95) translateY(20px);
      opacity: 0;
    }
    #lightbox-modal.show #lightbox-content {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    /* Animasi Teks Plakat Berurutan (Staggered) */
    .plaque-element {
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.6s var(--ease-spring);
    }
    #lightbox-modal.show .plaque-element {
      opacity: 1;
      transform: translateY(0);
    }
    /* Delay untuk masing-masing elemen plakat */
    .plaque-title { transition-delay: 0.2s; }
    .plaque-artist { transition-delay: 0.3s; }
    .plaque-line { transition-delay: 0.4s; }
    .plaque-message { transition-delay: 0.5s; }
    .plaque-icon { transition-delay: 0.6s; }

    /* --- TENTANG TOMBOL KEMBALI ESTETIK --- */
    .back-btn {
        position: fixed;
        top: 24px;
        left: 24px;
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(245, 158, 11, 0.25);
        border-radius: 30px;
        color: #f59e0b; /* Tailwind amber-500 */
        text-decoration: none;
        font-family: 'Poppins', sans-serif;
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 1px;
        text-transform: uppercase;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .back-btn:hover {
        background: rgba(0, 0, 0, 0.6);
        transform: translateX(-4px);
        border-color: #fbbf24; /* Tailwind amber-400 */
        color: #fbbf24;
        box-shadow: 0 6px 20px rgba(245, 158, 11, 0.35);
    }
    .back-btn svg {
        transition: transform 0.3s ease;
    }
    .back-btn:hover svg {
        transform: translateX(-2px);
    }
    @media (max-width: 768px) {
        .back-btn {
            top: 16px;
            left: 16px;
            padding: 8px 14px;
            font-size: 0.75rem;
        }
    }
  </style>
</head>
<body class="relative min-h-screen flex flex-col font-sans overflow-x-hidden bg-[url('gambar/bg1.png')] bg-cover bg-center bg-fixed bg-no-repeat selection:bg-amber-900/30 scroll-smooth">

  <!-- Tombol Kembali Estetik -->
  <a href="masuk.html" class="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      <span>Kembali</span>
  </a>
  
  <!-- --- Bagian Dinding Galeri (DIUBAH MENJADI LEBIH TRANSPARAN) --- -->
  <!-- bg-black/60 diubah jadi bg-black/30 -->
  <div class="flex-1 bg-black/30 backdrop-blur-sm pt-32 pb-20 px-4 sm:px-8 md:px-16 lg:px-24 flex items-center justify-center relative shadow-2xl overflow-hidden">
    
    <!-- Cahaya Ambien Latar Belakang -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[500px] bg-amber-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- Judul Ulang Tahun Estetik -->
    <div class="absolute top-12 left-0 right-0 text-center z-20 pointer-events-none flex flex-col items-center">
      <p class="text-amber-200/80 mb-3 font-light tracking-[0.4em] uppercase text-xs animate-title">Pameran Gambar</p>
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-serif text-stone-100 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] tracking-wide font-light animate-title delay-100">Selamat Ulang Tahun Sayang</h1>
      <div class="w-16 h-[1px] bg-amber-500/60 mt-6 animate-title delay-200"></div>
    </div>

    <!-- List Skirting -->
    <div class="absolute bottom-0 left-0 right-0 h-4 bg-stone-950/60 shadow-[0_-5px_15px_rgba(0,0,0,0.3)] z-10 backdrop-blur-md"></div>

    <!-- Kontainer Grid -->
    <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-12 gap-8 lg:gap-12 max-w-7xl mx-auto items-center relative z-10 mt-16 md:mt-24">
      <!-- Foto-foto akan dirender di sini oleh JS -->
    </div>
  </div>

  <!-- --- Modal Lightbox Estetik (EFEK BLUR TRANSPARAN) --- -->
  <div id="lightbox-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-8 bg-black/40 backdrop-blur-md opacity-0 pointer-events-none">
    
    <!-- Tombol Tutup -->
    <button id="close-modal" class="absolute top-6 right-6 md:top-8 md:right-8 bg-black/20 p-2 rounded-full text-stone-200 hover:text-white hover:bg-black/50 hover:rotate-90 transition-all duration-500 z-50 outline-none backdrop-blur-sm">
      <i data-lucide="x" class="w-8 h-8 md:w-10 md:h-10" stroke-width="1.5"></i>
    </button>

    <!-- Konten Modal -->
    <div id="lightbox-content" class="max-w-5xl w-full flex flex-col md:flex-row items-center justify-center gap-6 md:gap-12">
      <!-- Gambar Besar -->
      <div class="bg-[#faf9f6] p-3 md:p-4 shadow-2xl relative group max-h-[50vh] md:max-h-none shrink-0">
         <img id="modal-image" src="" alt="" class="max-h-[50vh] md:max-h-[75vh] w-auto object-contain shadow-sm border border-stone-200 transition-transform duration-700" />
      </div>
      
      <!-- Plakat Museum -->
      <div class="bg-white text-stone-800 p-8 md:p-10 shadow-2xl max-w-sm w-full flex flex-col items-center text-center relative border border-stone-100 shrink-0">
        <div class="absolute top-4 w-1.5 h-1.5 rounded-full bg-stone-300 shadow-inner"></div>
        
        <h3 id="modal-title" class="text-2xl md:text-3xl font-serif text-stone-900 mb-6 mt-2 plaque-element plaque-title">Judul</h3>
        
        <div class="w-12 h-[1px] bg-amber-700/20 mb-6 plaque-element plaque-line"></div>
        
        <p id="modal-message" class="text-sm md:text-base text-stone-600 italic leading-relaxed font-serif plaque-element plaque-message">"Pesan"</p>
        
        <div class="plaque-element plaque-icon">
          <i data-lucide="heart" class="w-5 h-5 text-amber-700/40 mt-8" stroke-width="1.5"></i>
        </div>
      </div>
    </div>
  </div>

  <!-- --- JAVASCRIPT --- -->
  <script>
    const artworks = [

        { id: 1, src: 'poto/1.jpeg ', title: 'Momen bahagia sehabis kamu selesai sempro', message: '“Momen berharga pas kamu selesai sempro. Bangga banget sama pencapaianmu, Sayang! Capeknya langsung hilang pas ngelihat senyum bahagia kamu.”', gridClass: 'lg:col-span-2 lg:col-start-2' },
        { id: 2, src: 'poto/2.jpeg', title: 'Momen gemes pas kamu lagi asyik main', message: '“Meskipun lagi seru-seruan main sama temenmu, tapi pas aku dapet foto random ini langsung tersenyum sendiri. Gemes banget ngelihat kamu sebahagia itu!”', gridClass: 'lg:col-span-2' },
        { id: 3, src: 'poto/12.jpeg', title: 'Manisnya ngerayain hari ulang tahunmu', message: '“Selamat ulang tahun, kesayangan. Semoga bahagia selalu bersamaku, dan semoga aku bisa terus merayakan hari-hari spesialmu selamanya.”', gridClass: 'lg:col-span-4 lg:row-span-2 scale-110 z-20 my-4 lg:my-0' },
        { id: 4, src: 'poto/13.jpeg', title: 'Misi sukses pengurasan dompet ter-happy!', message: '“Apapun demi bikin kamu tersenyum lebar. Pengurasan dompet paling ikhlas dan paling bikin bahagia sedunia!”', gridClass: 'lg:col-span-2' },
        { id: 5, src: 'poto/14.jpeg', title: 'Quality time & main bareng kesayangan', message: '“Nggak peduli permainannya apa, yang penting mainnya sama kamu. Waktu bareng kamu selalu jadi favorit aku.”', gridClass: 'lg:col-span-2' },
        { id: 6, src: 'poto/15.jpeg', title: 'Potret cantik kamu pas lagi santai di rumah', message: '“Lagi santai di rumah pun cantiknya nggak berkurang sama sekali. Selalu kagum setiap kali ngelihat kamu.”', gridClass: 'lg:col-span-2 lg:col-start-1' },
        { id: 7, src: 'poto/16.jpeg', title: 'Kencan pertama kita pas nonton bioskop', message: '“Inget nggak sih pas pertama kali kita nonton bareng? Rasanya deg-degan banget tapi bahagia luar biasa bisa di sebelah kamu.”', gridClass: 'lg:col-span-3 lg:col-start-3' },
        { id: 8, src: 'poto/17.jpeg', title: 'Langkah awal kita: Momen pertama kali jalan bareng', message: '“Awal mula dari semua perjalanan indah kita. Momen bersejarah yang nggak akan pernah aku lupain seumur hidup.”', gridClass: 'lg:col-span-3' },
        { id: 9, src: 'poto/18.jpeg', title: 'Momen manis pertama kali kita video call-an', message: '“Pertama kali denger suara dan lihat muka kamu lewat layar hp. Jarak terasa hilang seketika pas kamu senyum.”', gridClass: 'lg:col-span-2' }

    ];

    const galleryGrid = document.getElementById('gallery-grid');
    const modal = document.getElementById('lightbox-modal');
    const closeModalBtn = document.getElementById('close-modal');
    
    const modalImage = document.getElementById('modal-image');
    const modalTitle = document.getElementById('modal-title');
    const modalMessage = document.getElementById('modal-message');

    // Setup Intersection Observer
    const observerOptions = {
      root: null,
      rootMargin: '0px 0px -50px 0px',
      threshold: 0.15
    };

    const scrollObserver = new IntersectionObserver((entries, observer) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target); 
        }
      });
    }, observerOptions);

    function renderGallery() {
      artworks.forEach((art, index) => {
        const aspectClass = art.id === 3 ? 'aspect-[3/4]' : 'aspect-square';
        const delay = (index % 4) * 150; 
        const rotationAngle = index % 2 === 0 ? '1deg' : '-1deg';
        const aestheticSymbol = index % 2 === 0 ? '♡' : '❀';

        const artHTML = `
          <div class="${art.gridClass} reveal-item group relative cursor-pointer flex justify-center flex-col items-center w-full" style="transition-delay: ${delay}ms; transform: rotate(${rotationAngle}); transition: transform 0.6s var(--ease-spring);" onclick="openModal(${art.id})">
            <div class="absolute -top-16 w-32 h-32 bg-amber-100/10 rounded-full blur-[40px] pointer-events-none transition-all duration-700 group-hover:bg-amber-100/25 group-hover:blur-[50px] spotlight-anim"></div>
            <div class="bg-[#faf9f6] p-4 pb-6 sm:pb-7 shadow-[0_15px_40px_rgba(0,0,0,0.35)] ring-1 ring-black/10 transition-all duration-700 ease-[cubic-bezier(0.22,1,0.36,1)] group-hover:scale-[1.05] group-hover:-translate-y-4 group-hover:rotate-0 group-hover:shadow-[0_30px_60px_rgba(0,0,0,0.6)] relative z-10 w-full rounded-sm border border-stone-200/50">
              <div class="overflow-hidden border border-stone-200 relative shadow-[inset_0_2px_10px_rgba(0,0,0,0.08)] bg-stone-100 ${aspectClass} rounded-sm">
                <img src="${art.src}" alt="${art.title}" class="w-full h-full object-cover transition-transform duration-[2.5s] ease-out group-hover:scale-110 filter contrast-[0.98]" />
                <div class="absolute inset-0 bg-stone-900/40 opacity-0 group-hover:opacity-100 transition-all duration-500 flex items-center justify-center backdrop-blur-[2px]">
                  <i data-lucide="zoom-in" class="text-white/90 w-8 h-8 drop-shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500 ease-out" stroke-width="1.5"></i>
                </div>
              </div>
              <div class="mt-4 text-center">
                <p class="font-serif text-xs sm:text-sm font-semibold text-stone-800 tracking-wide line-clamp-1">${art.title}</p>
                <p class="text-stone-400 text-sm mt-2 font-light select-none transition-colors duration-300 group-hover:text-amber-700/60">${aestheticSymbol}</p>
              </div>
            </div>
          </div>
        `;
        galleryGrid.insertAdjacentHTML('beforeend', artHTML);
      });

      lucide.createIcons();

      document.querySelectorAll('.reveal-item').forEach(el => {
        scrollObserver.observe(el);
      });
    }

    window.openModal = function(id) {
      const art = artworks.find(item => item.id === id);
      if (art) {
        modalImage.src = art.src;
        modalImage.alt = art.title;
        modalTitle.textContent = art.title;
        modalMessage.textContent = `"${art.message}"`;
        
        modal.classList.add('show');
      }
    };

    function closeModal() {
      modal.classList.remove('show');
      setTimeout(() => {
        if (!modal.classList.contains('show')) {
          modalImage.src = '';
        }
      }, 500);
    }

    closeModalBtn.addEventListener('click', closeModal);
    
    modal.addEventListener('click', function(e) {
      if (e.target === modal) {
        closeModal();
      }
    });

    setTimeout(renderGallery, 100);
  </script>
</body>
</html>
