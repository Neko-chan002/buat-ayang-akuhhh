<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunci Rahasia Elegan</title>
    <script src="music.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #fdf2f8, #fbcfe8);
            margin: 0;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div id="main-container" class="glass-card p-8 rounded-3xl w-full max-w-sm text-center transition-all duration-700 ease-out z-10 floating">
        <div class="mb-6">
            <span class="text-4xl">🔐</span>
            <h1 class="text-2xl font-semibold text-rose-800 mt-2">“Ada angka yang selalu bikin aku berhenti sebentar bilangan prima, lima jari, dan awal cerita baru.” 🤍</h1>
            <p class="text-rose-600/70 text-sm mt-1">Masukkan kunci untuk membuka rahasia</p>
        </div>
        
        <input 
            type="password" 
            id="code-input" 
            placeholder="......" 
            maxlength="6"
            class="w-full p-4 text-center text-3xl tracking-[0.5em] bg-white/50 border border-rose-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-rose-400 mb-6 placeholder-rose-200"
        >
        
        <button 
            id="unlock-btn"
            class="w-full bg-rose-500 hover:bg-rose-600 text-white font-semibold py-4 rounded-2xl shadow-lg transition-all transform active:scale-95 hover:shadow-rose-500/30"
        >
            Buka Kunci
        </button>
        
        <div id="error-msg" class="text-rose-400 mt-4 text-sm font-medium opacity-0 transition-opacity">
            Ups, kode salah! Coba lagi ya ✨
        </div>
    </div>

    <div id="success-screen" class="hidden flex-col items-center justify-center z-20 text-rose-800 absolute opacity-0 transition-opacity duration-1000">
        <h2 class="text-5xl font-bold mb-4 drop-shadow-sm">Selamat! <a href="pertama.html">🌸</h2></a>
        <p class="text-xl font-light">Pintu rahasia telah terbuka tekan bunga nya.</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const correctCode = "230503";
        const input = document.getElementById('code-input');
        const btn = document.getElementById('unlock-btn');
        const container = document.getElementById('main-container');
        const errorMsg = document.getElementById('error-msg');
        const successScreen = document.getElementById('success-screen');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const flowers = ['🌸', '🌺', '🌼', '🌷', '💮'];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = Math.random() * 20 + 20;
                this.speed = Math.random() * 2 + 1;
                this.symbol = flowers[Math.floor(Math.random() * flowers.length)];
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 2 - 1;
            }
            update() {
                this.y += this.speed;
                this.angle += this.spin;
                if (this.y > canvas.height + 50) this.y = -50;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.font = `${this.size}px serif`;
                ctx.fillText(this.symbol, 0, 0);
                ctx.restore();
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() < 0.05) particles.push(new Particle());
            
            particles.forEach((p) => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        function verifyCode() {
            if (input.value === correctCode) {
                container.style.opacity = "0";
                container.style.transform = "scale(0.9)";
                setTimeout(() => {
                    container.classList.add('hidden');
                    successScreen.classList.remove('hidden');
                    successScreen.classList.add('flex');
                    setTimeout(() => { successScreen.style.opacity = "1"; }, 100);
                    animate();
                }, 500);
            } else {
                errorMsg.style.opacity = "1";
                input.classList.add('border-red-400');
                setTimeout(() => {
                    errorMsg.style.opacity = "0";
                    input.classList.remove('border-red-400');
                }, 2000);
            }
        }

        btn.addEventListener('click', verifyCode);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyCode();
        });
    </script>
</body>
</html>
