<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ucapan Doa Estetik</title>
    <script src="music.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Lora:ital,wght@0,400;1,400&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Tambahkan link gambar background kamu di sini */
            background-image: url('gambar/bg\ doa.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Agar gambar tidak ikut tergeser saat di-scroll */
            
            color: #111111;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }


        .container {
            display: flex;
            align-items: flex-start; /* Diubah agar sejajar di atas */
            justify-content: space-between;
            max-width: 1000px;
            width: 100%;
            gap: 60px;
        }

        /* --- Bagian Gambar di Kiri --- */
        .image-section {
            flex: 0.8;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-top: 20px; /* Sedikit jarak atas agar proporsional dengan teks */
        }

        .image-wrapper {
            position: relative;
            width: 280px; /* Lebar foto */
            height: 380px; /* Tinggi foto */
        }

        /* Kotak estetik di belakang foto */
        .image-wrapper::before {
            content: '';
            position: absolute;
            top: 25px; /* Bergeser ke bawah */
            right: -25px; /* Bergeser ke kanan */
            width: 100%;
            height: 100%;
            background-color: #e3dccc; /* Warna kotak belakang (coklat/krem pastel) */
            border: 2px solid #d4cbb8;
            border-radius: 8px; /* Sudut sedikit melengkung, tapi tetap berbentuk kotak */
            z-index: 0;
            transition: all 0.5s ease;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px; /* Mengikuti bentuk kotak background */
            position: relative;
            z-index: 1; /* Agar foto berada di atas kotak background */
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* --- Bagian Teks (Kanan) --- */
        .text-section {
            flex: 1.2;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        /* Teks diperkecil sesuai permintaan */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem; /* Diperkecil */
            color: #222;
            margin-bottom: 20px;
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .arabic {
            font-family: 'Amiri', serif;
            font-size: 1.5rem; /* Diperkecil */
            text-align: right;
            direction: rtl;
            line-height: 2;
            color: #111;
            margin-bottom: 20px;
            display: block;
        }

        .text-content p {
            font-size: 0.95rem; /* Diperkecil */
            line-height: 1.8;
            margin-bottom: 15px;
            color: #555;
            text-align: justify;
        }

        /* Efek Kursor Mengetik */
        .typing-cursor::after {
            content: '|';
            animation: blink 0.7s infinite;
            color: #999;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* --- Responsif untuk Layar HP --- */
        @media (max-width: 850px) {
            .container {
                flex-direction: column; /* Diubah agar gambar di atas, teks di bawah saat di HP */
                align-items: center;
                gap: 50px;
            }
            .text-section {
                width: 100%;
                padding: 30px 20px;
            }
            .image-section {
                margin-top: 0;
            }
            .image-wrapper {
                width: 240px;
                height: 320px;
                margin-top: 20px;
            }
            .image-wrapper::before {
                top: 15px;
                right: -15px;
            }
        }

        /* --- TENTANG TOMBOL KEMBALI ESTETIK --- */
        .back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(181, 147, 91, 0.3);
            border-radius: 30px;
            color: #6B2D37;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateX(-4px);
            border-color: #6B2D37;
            box-shadow: 0 6px 20px rgba(181, 147, 91, 0.25);
        }
        .back-btn svg {
            transition: transform 0.3s ease;
        }
        .back-btn:hover svg {
            transform: translateX(-2px);
        }
        @media (max-width: 850px) {
            .back-btn {
                top: 16px;
                left: 16px;
                padding: 8px 14px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- Tombol Kembali Estetik -->
    <a href="pertama.html" class="back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span>Kembali</span>
    </a>

    <div class="container">
        <!-- Bagian Gambar (Sekarang di Kiri) -->
        <div class="image-section">
            <div class="image-wrapper">
                <img src="potobackgeoun/3.jpeg" alt="Foto Estetik">
            </div>
        </div>

        <!-- Bagian Teks (Sekarang di Kanan) -->
        <div class="text-section">
            <h1 id="header">Doa & Harapan untuk Sayang 🤍</h1>
            <div class="text-content">
                <span id="p-arabic" class="arabic"></span>
                <p id="p-arti"></p>
                <p id="p-ucapan1"></p>
                <p id="p-ucapan2"></p>
            </div>
        </div>
    </div>

    <script>
        const texts = [
            { id: 'p-arabic', text: 'اللَّهُمَّ طَوِّلْ عُمُورَنَا وَصَحِّحْ أَجْسَادَنَا وَنَوِّرْ قُلُوْبَنَا وَثَبِّتْ إِيْمَانَنَا وَأَحْسِنْ أَعْمَالَنَا وَوَسِّعْ أَرْزَاقَنَا وَإِلَى الخَيْرِ قَرِّبْنَا وَعَنِ الشَّرِّ اَبْعِدْنَا وَاقْضِ حَوَائِجَنَا فِى الدِّيْنِ وَالدُّنْيَا وَالآخِرَةِ إِنَّكَ عَلَى كُلِّ شَىْءٍ قَدِيْرٌ' },
            { id: 'p-arti', text: '"Artinya: Ya Allah, panjangkanlah umur kami, sehatkanlah badan kami, terangilah hati kami, tetapkanlah iman kami, baikkanlah amalan kami, luaskanlah rezeki kami, dekatkanlah kami pada kebaikan dan jauhkanlah kami dari keburukan, kabulkanlah segala kebutuhan kami dalam urusan agama, dunia, dan akhirat. Sesungguhnya Engkau Maha Kuasa atas segala sesuatu." 🤍' },
            { id: 'p-ucapan1', text: '"Ya Allah, di hari pertambahan usia kekasihku ini, jadikanlah ia hamba yang selalu dekat dengan-Mu. Limpahkanlah kesehatan yang berkah, rezeki yang baik, dan kebahagiaan yang tak terputus untuknya. Jaga hatinya agar selalu damai bersamaku, dan lindungi setiap langkah kami untuk merajut masa depan bersama. Aamiin Ya Rabbal \'Alamiin, Sayangku." 🌸✨' },
        ];

        let textIndex = 0;
        let charIndex = 0;
        const typingSpeed = 15; // Kecepatan ketikan sangat cepat

        function typeEffect() {
            if (textIndex < texts.length) {
                const currentData = texts[textIndex];
                const element = document.getElementById(currentData.id);
                
                element.classList.add('typing-cursor');

                if (charIndex < currentData.text.length) {
                    element.innerHTML += currentData.text.charAt(charIndex);
                    charIndex++;
                    setTimeout(typeEffect, typingSpeed);
                } else {
                    element.classList.remove('typing-cursor');
                    textIndex++;
                    charIndex = 0;
                    setTimeout(typeEffect, 300); // Jeda sebelum paragraf berikutnya
                }
            }
        }

        window.onload = typeEffect;
    </script>

</body>
</html>
