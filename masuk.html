<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Ulang Tahun Aesthetic</title>
    <script src="music.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET DASAR --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Tambahkan link gambar background kamu di sini */
            background-image: url('gambar/bg1.png');
            background-size: 110%;
            background-position: center;
            background-attachment: fixed; 
            
            color: #111111;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- ANIMASI MASUK (FADE SLIDE UP) --- */
        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Durasi animasi diperlambat menjadi 1.2 detik agar lebih halus */
        .chapter-text, .birthday-text, .image-wrapper, .menu-container {
            opacity: 0; 
            animation: fadeSlideUp 1.2s ease-out forwards;
        }

        /* Urutan Animasi (Delay) dijauhkan jaraknya agar lebih elegan */
        .chapter-text { animation-delay: 0.5s; }
        .birthday-text { animation-delay: 1.2s; }
        .image-wrapper { animation-delay: 2.0s; }
        .menu-container { animation-delay: 2.8s; }

        /* --- CONTAINER UTAMA --- */
        .dashboard-container {
            max-width: 980px; 
            width: 100%;
            display: grid;
            grid-template-columns: auto 1fr; 
            gap: 60px; 
            align-items: start;
        }

        /* =========================================
            PANEL KIRI (FOTO UTAMA & CHAPTER)
        ======================================== */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 15px; 
        }

        .chapter-text {
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #a68a77; 
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: flex-start; 
            margin-left: 10px;
        }

        .chapter-text::before,
        .chapter-text::after {
            content: "✦";
            font-size: 1.2rem;
            margin: 0 10px;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            max-width: 320px; 
            margin: 0; 
        }

        .image-wrapper img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid #222;
            box-shadow: 16px 16px 0px #d8c8b8;
            transition: all 0.4s ease;
        }

        .image-wrapper img:hover {
            transform: translate(-4px, -4px);
            box-shadow: 20px 20px 0px #d8c8b8;
        }

        /* =========================================
            PANEL KANAN (TEKS UTAMA & MENU)
        ======================================== */
        .right-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px; 
        }

        .birthday-text h1 {
            font-family: 'Dancing Script', cursive; 
            font-size: 55px; 
            line-height: 1.2; 
            color: #1a1a1a; 
            font-weight: 700;
            text-align: left;
        }

        /* Menu Container (Diubah ke flex row) */
        .menu-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: flex-end; /* Rata Kanan */
            gap: 30px; 
            margin-top: 65px; 
            padding-bottom: 30px; 
        }

        .menu-card {
            display: flex;
            flex-direction: column; /* Gambar di atas, text di bawah */
            align-items: center;
            gap: 10px; 
            text-decoration: none;
            cursor: pointer;
            width: auto; 
        }

        .menu-img {
            width: 85px; 
            aspect-ratio: 1 / 1; 
            border-radius: 6px;
            border: 1px solid #222;
            overflow: hidden;
            position: relative;
            box-shadow: 6px 6px 0px #d8c8b8; 
            transition: all 0.3s ease;
        }

        .menu-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(30%);
            transition: all 0.5s ease;
        }

        .menu-text {
            font-family: 'Poppins', sans-serif;
            font-style: italic; 
            font-size: 0.95rem; 
            color: #333;
            transition: color 0.3s ease;
            white-space: nowrap; 
        }

        .menu-card:hover .menu-img {
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0px #d8c8b8;
        }

        .menu-card:hover .menu-img img {
            transform: scale(1.1);
            filter: grayscale(0%);
        }

        .menu-card:hover .menu-text {
            color: #a68a77;
        }

        .menu-card:active {
            transform: scale(0.95);
            transition: transform 0.1s ease;
        }

        /* =========================================
            RESPONSIVE (UNTUK TAMPILAN HP)
        ======================================== */
        @media screen and (max-width: 900px) {
            body {
                justify-content: center; 
                padding: 40px 20px 100px 20px; 
            }

            .dashboard-container {
                grid-template-columns: 1fr; 
                gap: 50px;
            }

            .left-panel {
                align-items: center;
                text-align: center;
            }

            .chapter-text {
                justify-content: center;
                margin-left: 0;
            }

            .image-wrapper {
                margin: 0 auto; 
            }

            .image-wrapper img {
                box-shadow: 12px 12px 0px #d8c8b8;
            }

            .right-panel {
                align-items: center;
                padding-top: 0; 
            }

            .birthday-text h1 {
                text-align: center;
                font-size: 45px; 
            }

            /* Responsif Menu */
            .menu-container {
                justify-content: center; /* Di HP ditengah agar tidak kepotong */
                flex-wrap: wrap;
                gap: 20px;
                margin-top: 40px; 
            }

            .menu-img {
                width: 70px; 
                box-shadow: 4px 4px 0px #d8c8b8;
            }

            .menu-text {
                font-size: 0.8rem;
            }
        }

        /* --- TENTANG TOMBOL KEMBALI ESTETIK --- */
        .back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(166, 138, 119, 0.3);
            border-radius: 30px;
            color: #a68a77;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateX(-4px);
            border-color: #a68a77;
            color: #1a1a1a;
            box-shadow: 0 6px 20px rgba(166, 138, 119, 0.15);
        }
        .back-btn svg {
            transition: transform 0.3s ease;
        }
        .back-btn:hover svg {
            transform: translateX(-2px);
        }
        @media (max-width: 768px) {
            .back-btn {
                top: 16px;
                left: 16px;
                padding: 8px 14px;
                font-size: 0.75rem;
            }
        }

        /* --- TRANSISI HALAMAN PREMIUM (FADE OUT) --- */
        .dashboard-container {
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .dashboard-container.fade-out {
            opacity: 0;
            transform: scale(0.96) translateY(-20px);
        }
    </style>
</head>
<body>

    <!-- Tombol Kembali Estetik -->
    <a href="pertama.html" class="back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span>Kembali</span>
    </a>

  <div class="dashboard-container">
    
    <div class="left-panel">
      <span class="chapter-text">✦ Chapter 1 ✦</span>
      <div class="image-wrapper">
        <img src="potobackgeoun/4.jpeg" alt="Foto Ulang Tahun Ka Haura">
      </div>
    </div>

    <div class="right-panel">
      
      <div class="birthday-text">
        <h1>Happy Birthday<br>Sayang</h1>
      </div>

      <div class="menu-container">
        <a href="ucapan.html" class="menu-card">
            <div class="menu-img"><img src="gambar/pesan.png" alt="Ucapan Spesial"></div>
            <span class="menu-text">Ucapan Spesial</span>
        </a>

        <a href="galeri.html" class="menu-card">
            <div class="menu-img"><img src="gambar/kucing.png" alt="Galeri Kenangan"></div>
            <span class="menu-text">Galeri Kenangan</span>
        </a>

        <a href="video.html" class="menu-card">
            <div class="menu-img"><img src="gambar/jhh.png" alt="Video Kita"></div>
            <span class="menu-text">Video Kita</span>
        </a>

        <a href="kado.html" class="menu-card">
            <div class="menu-img"><img src="gambar/penutup.png" alt="Pohon Senja"></div>
            <span class="menu-text">Pohon Senja</span>
        </a>
      </div>

    </div>

  </div>

  <!-- Script Transisi Animasi Masuk/Keluar Premium -->
  <script>
      document.querySelectorAll('.menu-card').forEach(card => {
          card.addEventListener('click', function(e) {
              e.preventDefault();
              const targetUrl = this.getAttribute('href');
              
              // Tambahkan kelas fade-out ke container utama
              const container = document.querySelector('.dashboard-container');
              container.classList.add('fade-out');
              
              // Lakukan navigasi setelah efek transisi selesai (450ms)
              setTimeout(() => {
                  window.location.href = targetUrl;
              }, 450);
          });
      });
  </script>
</body>
</html>
